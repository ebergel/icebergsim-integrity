# CONSTITUTION-LD.md §1: constitutional tests run in CI on every commit;
# a red constitutional test blocks merge, always.
# NOTE (EB, platform layer): to make "red blocks merge" binding on GitHub,
# mark the `constitutional` job as a required status check in branch
# protection for `main`. The workflow itself cannot do that.
name: constitutional

on:
  push:
  pull_request:

jobs:
  constitutional:
    name: constitutional tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run pytest tests/constitutional/ -v

  ruff:
    name: ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check src/ tests/

  mypy:
    name: mypy (types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run mypy src/
